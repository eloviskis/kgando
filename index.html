<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8B4513">
  <meta name="description" content="Kgando, a rede social retrô e instalável para reviews bem humoradas de operações no banheiro.">
  <title>Kgando — A Rede Social do Trono</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon-maskable.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=40">
  <!-- Captura beforeinstallprompt o mais cedo possível (antes do app.js carregar) -->
  <script>
  (function () {
    var KEY = 'kgando:pwaInstall';
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.__deferredPWAEvent = e;
      try { sessionStorage.setItem(KEY, '1'); } catch (_) {}
      document.dispatchEvent(new CustomEvent('kgando:pwa-ready'));
    });
    window.addEventListener('appinstalled', function () {
      window.__deferredPWAEvent = null;
      try { sessionStorage.removeItem(KEY); } catch (_) {}
    });
  })();
  </script>
  <!-- i18n locale files — carregados antes de app.js -->
  <script src="locales/pt.js?v=40"></script>
  <script src="locales/en.js?v=40"></script>
</head>
<body>
  <a class="skip-link" href="#pageRoot">Pular para o conteúdo</a>

  <header class="topbar">
    <div class="topbar__inner">
      <button class="brand" type="button" data-page="home" aria-label="Ir para o início">
        <span class="brand__mark" aria-hidden="true">🚽</span>
        <span>
          <strong>Kgando <sup style="font-size:9px;opacity:0.6;font-weight:500">BETA</sup></strong>
          <small>rede social do trono</small>
        </span>
      </button>

      <label class="search-box" for="globalSearch">
        <span aria-hidden="true">⌕</span>
        <input id="globalSearch" type="search" autocomplete="off"
               placeholder="Buscar pessoas, banheiros..."
               data-placeholder-lg="Buscar pessoas, banheiros, comunidades...">
      </label>

      <div class="topbar__actions">
        <span id="connectionStatus" class="status-pill" aria-live="polite">Online</span>
        <button id="installButton" class="ghost-button" type="button" data-action="install-app" hidden>Instalar</button>
        <button class="notif-btn" type="button" data-action="open-notifications" aria-label="Notificações" id="notifBtn">
          💩
          <span class="notif-badge" id="notifBadge" hidden>0</span>
        </button>
        <button id="langToggleBtn" class="lang-toggle" type="button" data-action="toggle-lang" title="Change language / Mudar idioma">🇧🇷</button>
        <button class="avatar-button" type="button" data-action="toggle-avatar-menu" aria-label="Menu do usuário">
          <span id="headerAvatar" class="avatar avatar--small">?</span>
        </button>
        <div id="avatarMenu" class="avatar-menu" hidden>
          <button class="avatar-menu-item" data-page="profile" type="button" id="menuMyProfile">💩 Meu Perfil</button>
          <button class="avatar-menu-item" data-page="settings" type="button" id="menuSettings">⚙️ Configurações</button>
          <div class="avatar-menu-divider"></div>
          <button class="avatar-menu-item avatar-menu-item--danger" data-action="logout" type="button" id="menuLogout">↩ Sair do Trono</button>
        </div>
      </div>
    </div>
  </header>

  <div id="searchPanel" class="search-panel" hidden></div>

  <div class="app-layout">
    <aside class="left-rail" aria-label="Navegação principal">
      <button class="primary-action" type="button" data-page="new">
        <span aria-hidden="true">💩</span>
        Avaliar nova cagada
      </button>

      <nav id="desktopNav" class="nav-stack"></nav>
    </aside>

    <main id="pageRoot" class="main-content" tabindex="-1"></main>

    <aside id="rightRail" class="right-rail" aria-label="Resumo da comunidade"></aside>
  </div>

  <nav id="mobileNav" class="bottom-nav" aria-label="Navegação mobile"></nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="modalHost" class="modal-host" aria-live="polite"></div>

  <!-- Landing page (shown when not logged in) -->
  <div id="landingRoot" style="display:none;"></div>

  <!-- Auth modal (shown when not logged in) -->
  <div id="authOverlay" class="modal-overlay auth-modal" style="display:none; position:fixed; inset:0; z-index:4000; background:rgba(0,0,0,.7);">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header" style="border-radius:24px 24px 0 0;">
        <h2>💩 Kgando</h2>
        <button class="modal-close" onclick="hideAuthModal()" type="button" aria-label="Fechar">✕</button>
      </div>
      <div class="modal-body">
        <div class="auth-tabs">
          <button class="auth-tab active" id="tabLogin"   type="button" onclick="switchAuthTab('login')">Entrar</button>
          <button class="auth-tab"        id="tabRegister" type="button" onclick="switchAuthTab('register')">Cadastrar</button>
        </div>

        <!-- Botão Google (compartilhado entre login e cadastro) -->
        <a id="googleLoginBtn" href="/api/auth/google" class="google-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Continuar com Google
        </a>

        <div class="auth-divider"><span>ou</span></div>

        <!-- Login form -->
        <form id="loginForm" class="auth-form" onsubmit="handleAuthSubmit(event,'login')">
          <input class="auth-input" type="text"     name="username"     placeholder="Usuário ou e-mail" autocomplete="username"     required>
          <input class="auth-input" type="password" name="password"     placeholder="Senha"             autocomplete="current-password" required>
          <!-- 2FA field (hidden until needed) -->
          <div id="totpField" style="display:none">
            <p style="font-size:13px;color:var(--muted);margin:0 0 8px;text-align:center">🔐 Digite o código do seu app autenticador:</p>
            <input class="auth-input" type="text" name="totp_code" id="totpCodeInput"
                   placeholder="000 000" autocomplete="one-time-code" maxlength="7"
                   style="text-align:center;font-size:22px;letter-spacing:6px;font-weight:700">
          </div>
          <p id="loginError" class="auth-error" hidden></p>
          <button class="auth-submit" type="submit">Entrar 🚽</button>
          <button type="button" class="forgot-password-link" onclick="window.showForgotPassword()">Esqueci minha senha</button>
        </form>

        <!-- Forgot password form (hidden initially) -->
        <form id="forgotForm" class="auth-form" style="display:none;" onsubmit="handleForgotPassword(event)">
          <p style="font-size:13px;color:var(--muted);margin:0 0 12px">Informe seu e-mail para receber o link de redefinição:</p>
          <input class="auth-input" type="email" name="email" placeholder="Seu e-mail" required>
          <p id="forgotMsg" class="auth-error" hidden></p>
          <button class="auth-submit" type="submit">Enviar link 🔑</button>
          <button type="button" class="forgot-password-link" onclick="window.showForgotPassword(false)">← Voltar ao login</button>
        </form>

        <!-- Reset password form (hidden initially) -->
        <form id="resetForm" class="auth-form" style="display:none;" onsubmit="handleResetPassword(event)">
          <p style="font-size:13px;color:var(--muted);margin:0 0 12px">Digite sua nova senha:</p>
          <input class="auth-input" type="password" name="password" placeholder="Nova senha (mín. 6 caracteres)" required>
          <input class="auth-input" type="password" name="password2" placeholder="Confirme a nova senha" required>
          <p id="resetMsg" class="auth-error" hidden></p>
          <button class="auth-submit" type="submit">Salvar nova senha 🔑</button>
        </form>

        <!-- Register form -->
        <form id="registerForm" class="auth-form" style="display:none;" onsubmit="handleAuthSubmit(event,'register')">
          <input class="auth-input" type="text"     name="display_name" placeholder="Nome de exibição"  autocomplete="name"             required>
          <input class="auth-input" type="text"     name="username"     placeholder="Usuário (sem espaços)" autocomplete="username"   required>
          <input class="auth-input" type="email"    name="email"        placeholder="E-mail"             autocomplete="email"            required>
          <input class="auth-input" type="password" name="password"     placeholder="Senha (mín. 6 chars)" autocomplete="new-password"  required>
          <input class="auth-input" type="text"     name="invite_code"  id="inviteCodeInput" placeholder="Código de convite (opcional)" autocomplete="off">
          <p id="inviteBanner" style="display:none;font-size:12px;padding:8px 12px;background:rgba(107,191,89,.15);border-radius:10px;color:#3a6e2a;margin-bottom:4px"></p>
          <p id="registerError" class="auth-error" hidden></p>
          <button class="auth-submit" type="submit">Criar conta 💩</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Notifications panel -->
  <div id="notifPanel" class="notif-panel" hidden>
    <div class="notif-panel__header">
      <strong id="notifTitle">Notificações</strong>
      <div style="display:flex;gap:8px;align-items:center">
        <button type="button" onclick="window.markAllNotifsRead()" class="notif-read-all" id="notifMarkAll">Marcar todas como lidas</button>
        <button type="button" onclick="window.clearAllNotifications()" class="notif-clear-all" id="notifClearAll" title="Limpar todas">🗑️</button>
      </div>
      <button type="button" class="notif-close" onclick="closeNotifPanel()" id="notifCloseBtn">✕</button>
    </div>
    <div id="notifList" class="notif-list"><div class="spinner"></div></div>
  </div>
  <div id="notifOverlay" hidden onclick="closeNotifPanel()" style="position:fixed;inset:0;z-index:2998;"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script src="app.js?v=40" defer></script>

  <!-- Rodapé legal discreto -->
  <footer class="site-footer">
    <span>© 2026 Kgando</span>
    <a href="/privacidade" target="_blank" id="footerPrivacy">Privacidade</a>
    <a href="/termos" target="_blank" id="footerTerms">Termos</a>
    <a href="/exclusao" target="_blank" id="footerDeletion">Exclusão de dados</a>
    <button id="bugReportBtn" class="bug-report-btn" type="button">🐛 Achei um Bug! QUE MER**!</button>
  </footer>
</body>
</html>
